<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% if username %}
        <span class="user-greeting"> {{ username }} </span>
        <a href="/logout" >Выйти</a>
    {% else %}
        <a href="/login" >Войти</a>
        <a href="/register" >Регистрация</a>
    {% endif %}

    <div style="position: fixed; top: 10px; left: 10px; color: #000000; font-size: 14px;">
    <span id="clock">🕒 --:--:--</span>
    </div>

    <h2>Вход</h2>
    <a href="/login" class="login-btn">Вход</a>
    <div class="round-btn" title="Написать">
    💬</div>
    {% if message %}
    <p style="color: green;">{{ message }}</p>
    {% endif %}
   

         <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <br><br>
            <input type="password" name="password" placeholder="Пароль" required>
            <br><br>
            <button type="submit">Войти</button>
        </form>

    <div class="page-map">
    <h3>Страницы сайта:</h3>
    <ul>
        
        <li><a href="/">Главная</a></li>
        <li><a href="/about">О нас</a></li>
        <li><a href="/contact">Контакты</a></li>
        <li><a href="/register" class="active">Регистрация</a></li>
    </ul>
    </div>

    <script>
    function updateClock() {
        const now = new Date();
        const time = now.toTimeString().slice(0, 8);
        document.getElementById('clock').textContent = '🕒 ' + time;
    }
    setInterval(updateClock, 1000);
    updateClock(); // Запускаем сразу
    </script>
    
</body>
</html>
